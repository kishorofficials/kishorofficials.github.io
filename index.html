<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishor | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .btn-hover:hover { transform: translateY(-2px); transition: all 0.2s; background: #21262d; border-color: #8b949e; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass rounded-3xl p-8 text-center shadow-2xl">
        <div class="relative w-24 h-24 mx-auto mb-4">
            <img src="https://github.com/kishorofficials.png" alt="Kishor" class="rounded-full border-4 border-blue-500 p-1">
        </div>
        
        <h1 class="text-3xl font-bold text-white mb-1">Kishor</h1>
        <p class="text-blue-400 font-medium mb-6">@kishorofficials</p>

        <p class="text-gray-400 mb-8 leading-relaxed">
            Passionate developer building digital experiences. Exploring the intersection of code, design, and innovation.
        </p>

        <div class="space-y-4">
            <a href="https://github.com/kishorofficials" class="block w-full py-4 glass rounded-xl font-semibold btn-hover flex items-center justify-center gap-3">
                <i class="fab fa-github text-xl"></i> My Repositories
            </a>
            
            <a href="#" class="block w-full py-4 glass rounded-xl font-semibold btn-hover flex items-center justify-center gap-3 text-blue-400 border-blue-900/30">
                <i class="fas fa-envelope text-xl"></i> Contact Me
            </a>

            <a href="#" class="block w-full py-4 glass rounded-xl font-semibold btn-hover flex items-center justify-center gap-3">
                <i class="fab fa-linkedin text-xl text-blue-500"></i> LinkedIn
            </a>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-800">
            <p class="text-xs text-gray-500 uppercase tracking-widest">Built with HTML & Tailwind</p>
        </div>
    </div>

</body>
</html>
